openapi: "3.0.0"
info:
  title: Demo Items API
  version: "1.0"
paths:
  /items/{id}:
    get:
      operationId: get_item
      summary: Get item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  price:
                    type: number
                    format: float
