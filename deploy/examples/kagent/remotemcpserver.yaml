## RemoteMCPServer — registers mcp-anything as a tool provider for kagent.
## Apply after the mcp-anything proxy Service is running:
##   kubectl apply -f deploy/examples/kagent/remotemcpserver.yaml -n <NAMESPACE>
##
## Replace <MCP_SERVICE_URL> with the in-cluster address of the mcp-anything proxy Service,
## e.g. http://demo-proxy.mcp-system.svc.cluster.local:8080/mcp

apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: mcp-anything
  namespace: mcp-system
spec:
  description: "mcp-anything proxy exposing the Demo Items API as MCP tools"
  protocol: STREAMABLE_HTTP
  url: "<MCP_SERVICE_URL>"
