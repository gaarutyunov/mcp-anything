apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcpupstreams.mcp-anything.ai
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
spec:
  group: mcp-anything.ai
  names:
    kind: MCPUpstream
    listKind: MCPUpstreamList
    plural: mcpupstreams
    singular: mcpupstream
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: MCPUpstream is the Schema for the mcpupstreams API.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: MCPUpstreamSpec defines the desired state of MCPUpstream.
              properties:
                type:
                  type: string
                  description: "Type is the upstream type: http (default) or command."
                  default: http
                  enum: [http, command]
                toolPrefix:
                  type: string
                  description: ToolPrefix is prepended to all tool names from this upstream.
                commands:
                  type: array
                  description: Commands defines command-backed MCP tools. Required when type is command.
                  items:
                    type: object
                    required: [toolName, command]
                    properties:
                      toolName:
                        type: string
                        description: ToolName is the tool name (without prefix).
                      description:
                        type: string
                        description: Description is the human-readable tool description.
                      command:
                        type: string
                        description: Command is the Go text/template command string.
                      shell:
                        type: boolean
                        description: Shell enables shell mode (sh -c) with auto-quoting.
                      workingDir:
                        type: string
                        description: WorkingDir sets the working directory for the child process.
                      timeout:
                        type: string
                        description: "Timeout per execution (e.g. 30s)."
                      maxOutput:
                        type: integer
                        format: int64
                        description: MaxOutput caps bytes captured from stdout/stderr.
                      env:
                        type: object
                        additionalProperties:
                          type: string
                        description: Env is a map of additional environment variables.
                      inputSchema:
                        type: object
                        description: InputSchema defines the JSON Schema for tool arguments.
                        properties:
                          type:
                            type: string
                          properties:
                            type: object
                            additionalProperties:
                              type: object
                              properties:
                                type:
                                  type: string
                                description:
                                  type: string
                          required:
                            type: array
                            items:
                              type: string
                serviceRef:
                  type: object
                  description: ServiceRef references an in-cluster Kubernetes Service.
                  required: [name, port]
                  properties:
                    name:
                      type: string
                    port:
                      type: integer
                      format: int32
                      minimum: 1
                      maximum: 65535
                baseURL:
                  type: string
                  description: BaseURL is the base URL for the upstream HTTP API.
                openapi:
                  type: object
                  description: OpenAPI configures the OpenAPI spec source.
                  properties:
                    configMapRef:
                      type: object
                      required: [name, key]
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                    url:
                      type: string
                    autoDiscover:
                      type: object
                      properties:
                        path:
                          type: string
                overlay:
                  type: object
                  description: Overlay configures an optional OpenAPI Overlay document.
                  properties:
                    configMapRef:
                      type: object
                      required: [name, key]
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                outboundAuth:
                  type: object
                  description: OutboundAuth configures authentication for outbound requests.
                  required: [strategy]
                  properties:
                    strategy:
                      type: string
                      enum: [bearer, oauth2_client_credentials, none]
                    oauth2:
                      type: object
                      required: [tokenURL]
                      properties:
                        tokenURL:
                          type: string
                        secretRef:
                          type: object
                          required: [name]
                          properties:
                            name:
                              type: string
                transport:
                  type: object
                  description: Transport configures HTTP transport settings.
                  properties:
                    maxIdleConns:
                      type: integer
                    tls:
                      type: object
                      required: [secretName]
                      properties:
                        secretName:
                          type: string
                validation:
                  type: object
                  description: Validation configures request/response validation.
                  properties:
                    validateRequest:
                      type: boolean
                    validateResponse:
                      type: boolean
            status:
              type: object
              description: MCPUpstreamStatus defines the observed state of MCPUpstream.
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required: [lastTransitionTime, message, reason, status, type]
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
                assignedProxy:
                  type: string
                toolCount:
                  type: integer
      additionalPrinterColumns:
        - name: Proxy
          type: string
          jsonPath: .status.assignedProxy
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
