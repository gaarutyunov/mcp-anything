{{- $clusterScoped := eq .Values.watchNamespace "" -}}
{{- $saName := include "mcp-anything.serviceAccountName" . -}}
---
{{- if $clusterScoped }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mcp-anything.fullname" . }}
  labels:
    {{- include "mcp-anything.labels" . | nindent 4 }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mcp-anything.fullname" . }}
  namespace: {{ .Values.watchNamespace }}
  labels:
    {{- include "mcp-anything.labels" . | nindent 4 }}
{{- end }}
rules:
  - apiGroups: [mcp-anything.ai]
    resources: [mcpproxies, mcpupstreams]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [mcp-anything.ai]
    resources: [mcpproxies/status, mcpupstreams/status]
    verbs: [get, update, patch]
  - apiGroups: [mcp-anything.ai]
    resources: [mcpproxies/finalizers, mcpupstreams/finalizers]
    verbs: [update]
  - apiGroups: [""]
    resources: [configmaps, services]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
---
{{- if $clusterScoped }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mcp-anything.fullname" . }}
  labels:
    {{- include "mcp-anything.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mcp-anything.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ .Release.Namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mcp-anything.fullname" . }}
  namespace: {{ .Values.watchNamespace }}
  labels:
    {{- include "mcp-anything.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mcp-anything.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
