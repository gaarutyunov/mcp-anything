name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOWORK: off
  PROXY_IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

jobs:
  lint-and-test:
    name: Lint, Vet, Unit Tests, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.7.2

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -count=1 ./...

      - name: Build
        run: go build ./...

  build-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.PROXY_IMAGE }}

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-image]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Testcontainers Cloud Client
        uses: atomicjar/testcontainers-cloud-setup-action@v1
        with:
          token: ${{ secrets.TC_CLOUD_TOKEN }}

      - name: Integration tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: go test -race -tags integration -count=1 -timeout 300s ./tests/integration/...
        env:
          PROXY_IMAGE: ${{ env.PROXY_IMAGE }}
