---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: mcpproxies.mcp-anything.ai
spec:
  group: mcp-anything.ai
  names:
    kind: MCPProxy
    listKind: MCPProxyList
    plural: mcpproxies
    singular: mcpproxy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.upstreamCount
      name: Upstreams
      type: integer
    - jsonPath: .status.toolCount
      name: Tools
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: MCPProxy is the Schema for the mcpproxies API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MCPProxySpec defines the desired state of MCPProxy.
            properties:
              gatewayRef:
                description: |-
                  GatewayRef configures Kubernetes Gateway API HTTPRoute creation.
                  When set, the operator creates an HTTPRoute that routes traffic from the
                  referenced Gateway to the proxy Service.
                properties:
                  hostname:
                    description: |-
                      Hostname is the hostname to match in the HTTPRoute rules.
                      If empty, all hostnames are matched.
                    type: string
                  name:
                    description: Name is the name of the Gateway resource.
                    type: string
                  namespace:
                    description: |-
                      Namespace is the namespace of the Gateway resource.
                      Defaults to the same namespace as the MCPProxy.
                    type: string
                required:
                - name
                type: object
              image:
                description: Image is the proxy container image. Defaults to ghcr.io/gaarutyunov/mcp-anything:latest.
                type: string
              inboundAuth:
                description: InboundAuth configures authentication for inbound MCP
                  clients.
                properties:
                  jwt:
                    description: |-
                      JWT configures JWT Bearer token validation.
                      Generated from pkg/config.JWTAuthConfig.
                    properties:
                      audience:
                        type: string
                      issuer:
                        type: string
                      jwksUrl:
                        description: optional; uses OIDC discovery if empty
                        type: string
                    type: object
                  strategy:
                    description: 'Strategy is the auth strategy: jwt|none.'
                    enum:
                    - jwt
                    - none
                    type: string
                required:
                - strategy
                type: object
              namespaceSelector:
                description: |-
                  NamespaceSelector restricts which namespaces are searched for matching
                  MCPUpstream resources. If empty, only the same namespace as the MCPProxy is searched.
                properties:
                  matchNames:
                    description: MatchNames is a list of namespace names to search
                      for MCPUpstream resources.
                    items:
                      type: string
                    type: array
                type: object
              naming:
                description: |-
                  Naming configures how MCP tool names are generated.
                  Generated from pkg/config.NamingConfig.
                properties:
                  conflictResolution:
                    type: string
                  defaultSlugRules:
                    description: SlugRulesConfig controls which slug transformations
                      are applied.
                    properties:
                      collapseSeparators:
                        type: boolean
                      expandCamelCase:
                        description: |-
                          ExpandCamelCase inserts underscores at camelCase word boundaries before
                          other transformations, so operationIds like "getGreeting" become
                          "get_greeting" rather than "getgreeting".
                        type: boolean
                      lowercase:
                        type: boolean
                      replaceBraces:
                        type: boolean
                      replaceSlashes:
                        type: boolean
                    type: object
                  descriptionMaxLength:
                    type: integer
                  descriptionTruncationSuffix:
                    type: string
                  maxLength:
                    type: integer
                  separator:
                    type: string
                type: object
              rateLimits:
                description: |-
                  RateLimits configures named rate limit policies for tool calls.
                  Policies are referenced by MCPUpstream resources via the rateLimit field.
                properties:
                  policies:
                    additionalProperties:
                      description: MCPProxyRateLimitPolicySpec defines a named rate
                        limit policy.
                      properties:
                        average:
                          description: Average is the number of requests allowed per
                            Period.
                          format: int64
                          type: integer
                        burst:
                          description: Burst is the number of additional requests
                            allowed above Average in a single burst.
                          format: int64
                          type: integer
                        period:
                          description: Period is the time window for rate limiting
                            (e.g. "1m", "1h").
                          type: string
                        source:
                          description: |-
                            Source determines the counter key: "user" (authenticated subject),
                            "ip" (remote address), or "session" (MCP session ID). Defaults to "ip".
                          type: string
                      required:
                      - average
                      - period
                      type: object
                    description: |-
                      Policies maps rate limit policy names to their configurations.
                      MCPUpstream resources reference these policies by name via the rateLimit field.
                    type: object
                type: object
              replicas:
                description: Replicas is the number of proxy pod replicas. Defaults
                  to 1.
                format: int32
                minimum: 1
                type: integer
              resources:
                description: Resources defines CPU/memory requirements for the proxy
                  container.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              server:
                description: Server configures the MCP server endpoint.
                properties:
                  port:
                    description: Port is the port the proxy server listens on. Defaults
                      to 8080.
                    format: int32
                    type: integer
                  tls:
                    description: TLS configures TLS termination for the proxy server
                      using a Kubernetes Secret.
                    properties:
                      secretName:
                        description: SecretName is the name of the Secret containing
                          tls.crt and tls.key.
                        type: string
                    required:
                    - secretName
                    type: object
                  transport:
                    description: Transport is the list of MCP transport protocols
                      to enable (e.g. sse, streamable-http).
                    items:
                      type: string
                    type: array
                type: object
              serviceDiscovery:
                description: ServiceDiscovery configures annotation-based upstream
                  discovery from Kubernetes Services.
                properties:
                  enabled:
                    description: Enabled enables scanning for Services annotated with
                      mcp-anything.ai/enabled=true.
                    type: boolean
                  namespaceSelector:
                    description: |-
                      NamespaceSelector restricts which namespaces are scanned for annotated Services.
                      If not set, the same namespaces as NamespaceSelector are used.
                    properties:
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: MatchLabels scans all namespaces whose labels
                          match these key-value pairs.
                        type: object
                      matchNames:
                        description: MatchNames is a list of specific namespace names
                          to scan.
                        items:
                          type: string
                        type: array
                    type: object
                type: object
              telemetry:
                description: |-
                  Telemetry configures observability settings.
                  Generated from pkg/config.TelemetryConfig.
                properties:
                  insecure:
                    description: skip TLS for OTLP gRPC (useful in tests)
                    type: boolean
                  otlpEndpoint:
                    description: e.g. "localhost:4317"; empty = no trace exporter
                    type: string
                  serviceName:
                    type: string
                  serviceVersion:
                    type: string
                type: object
              upstreamSelector:
                description: UpstreamSelector selects MCPUpstream resources by label.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            type: object
          status:
            description: MCPProxyStatus defines the observed state of MCPProxy.
            properties:
              annotatedServiceCount:
                description: AnnotatedServiceCount is the number of annotated Services
                  currently discovered.
                type: integer
              conditions:
                description: Conditions represents the latest available observations
                  of the MCPProxy state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the generation of the spec last
                  processed by the controller.
                format: int64
                type: integer
              toolCount:
                description: ToolCount is the total number of MCP tools exposed.
                type: integer
              upstreamCount:
                description: UpstreamCount is the number of MCPUpstream resources
                  currently selected.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
