version: 2

project_name: mcp-anything

before:
  hooks:
    - go mod tidy

builds:
  - id: proxy
    main: ./cmd/proxy
    binary: proxy
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: operator
    main: ./cmd/operator
    binary: operator
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers_v2:
  - ids: [proxy]
    images:
      - "ghcr.io/gaarutyunov/mcp-anything"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile.goreleaser

  - ids: [operator]
    images:
      - "ghcr.io/gaarutyunov/mcp-anything-operator"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile.operator.goreleaser

helm_charts:
  - name: mcp-anything
    dir: charts/mcp-anything
    chart_version: "{{ .Version }}"
    app_version: "{{ .Version }}"
    oci:
      - host: ghcr.io
        owner: gaarutyunov

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: gaarutyunov
    name: mcp-anything
  prerelease: auto
  name_template: "v{{ .Version }}"
