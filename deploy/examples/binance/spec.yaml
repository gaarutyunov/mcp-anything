openapi: "3.0.0"
info:
  title: Binance Spot Market Data API
  description: >
    Public market data and statistics endpoints for Binance Spot trading.
    All endpoints listed here require no authentication and are rate-limited
    to 1200 weight per minute per IP address.
  version: "v3"
servers:
  - url: https://api.binance.com

paths:
  /api/v3/ping:
    get:
      operationId: ping
      summary: Test connectivity to Binance API
      description: Test connectivity to the REST API. Returns an empty object on success.
      responses:
        "200":
          description: Successful connectivity test
          content:
            application/json:
              schema:
                type: object
                description: Empty response object

  /api/v3/time:
    get:
      operationId: getServerTime
      summary: Get Binance server time
      description: >
        Test connectivity to the REST API and get the current server time
        in milliseconds since Unix epoch.
      responses:
        "200":
          description: Current server time
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverTime:
                    type: integer
                    format: int64
                    description: Server time in milliseconds since Unix epoch

  /api/v3/exchangeInfo:
    get:
      operationId: getExchangeInfo
      summary: Get exchange trading rules and symbol information
      description: >
        Returns current exchange trading rules and symbol information.
        If no symbol or symbols are provided, returns information for all symbols.
      parameters:
        - name: symbol
          in: query
          description: Trading pair symbol (e.g. BTCUSDT)
          required: false
          schema:
            type: string
        - name: symbols
          in: query
          description: >
            JSON array of trading pair symbols (e.g. ["BTCUSDT","ETHUSDT"]).
            Mutually exclusive with symbol.
          required: false
          schema:
            type: string
        - name: permissions
          in: query
          description: Filter symbols by trading permissions (e.g. SPOT, MARGIN)
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Exchange information
          content:
            application/json:
              schema:
                type: object

  /api/v3/depth:
    get:
      operationId: getOrderBookDepth
      summary: Get order book depth for a symbol
      description: >
        Returns the current order book depth (bids and asks) for a trading pair.
        The limit parameter controls how many price levels are returned.
      parameters:
        - name: symbol
          in: query
          description: Trading pair symbol (e.g. BTCUSDT)
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: Number of price levels to return. Default 100; max 5000.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 100
      responses:
        "200":
          description: Order book depth
          content:
            application/json:
              schema:
                type: object
                properties:
                  lastUpdateId:
                    type: integer
                  bids:
                    type: array
                    items:
                      type: array
                      items:
                        type: string
                    description: Array of [price, quantity] pairs
                  asks:
                    type: array
                    items:
                      type: array
                      items:
                        type: string
                    description: Array of [price, quantity] pairs

  /api/v3/trades:
    get:
      operationId: getRecentTrades
      summary: Get recent trades for a symbol
      description: >
        Returns a list of the most recent trades for a trading pair.
        Trades are ordered from oldest to newest.
      parameters:
        - name: symbol
          in: query
          description: Trading pair symbol (e.g. BTCUSDT)
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: Number of trades to return. Default 500; max 1000.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 500
      responses:
        "200":
          description: List of recent trades
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    price:
                      type: string
                    qty:
                      type: string
                    quoteQty:
                      type: string
                    time:
                      type: integer
                      format: int64
                    isBuyerMaker:
                      type: boolean
                    isBestMatch:
                      type: boolean

  /api/v3/avgPrice:
    get:
      operationId: getCurrentAveragePrice
      summary: Get current average price for a symbol
      description: >
        Returns the current average price for a symbol, calculated over
        the last 5 minutes.
      parameters:
        - name: symbol
          in: query
          description: Trading pair symbol (e.g. BTCUSDT)
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current average price
          content:
            application/json:
              schema:
                type: object
                properties:
                  mins:
                    type: integer
                    description: Average price interval in minutes
                  price:
                    type: string
                    description: Average price as a decimal string
                  closeTime:
                    type: integer
                    format: int64
                    description: Close time of the averaging window in milliseconds

  /api/v3/ticker/24hr:
    get:
      operationId: get24hrTickerPriceChangeStatistics
      summary: Get 24-hour rolling window price change statistics
      description: >
        Returns 24-hour rolling window price change statistics for one or all symbols.
        If no symbol is provided, returns statistics for all symbols.
        Note: When no symbol is provided, the response can be very large.
      parameters:
        - name: symbol
          in: query
          description: >
            Trading pair symbol (e.g. BTCUSDT). If omitted, returns statistics
            for all symbols.
          required: false
          schema:
            type: string
        - name: type
          in: query
          description: >
            Response type: FULL returns all fields, MINI returns a subset.
            Default is FULL.
          required: false
          schema:
            type: string
            enum: [FULL, MINI]
      responses:
        "200":
          description: >
            24-hour price change statistics. Returns an object when symbol is
            specified, or an array when no symbol is given.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      symbol:
                        type: string
                      priceChange:
                        type: string
                      priceChangePercent:
                        type: string
                      weightedAvgPrice:
                        type: string
                      prevClosePrice:
                        type: string
                      lastPrice:
                        type: string
                      lastQty:
                        type: string
                      bidPrice:
                        type: string
                      bidQty:
                        type: string
                      askPrice:
                        type: string
                      askQty:
                        type: string
                      openPrice:
                        type: string
                      highPrice:
                        type: string
                      lowPrice:
                        type: string
                      volume:
                        type: string
                      quoteVolume:
                        type: string
                      openTime:
                        type: integer
                        format: int64
                      closeTime:
                        type: integer
                        format: int64
                      firstId:
                        type: integer
                      lastId:
                        type: integer
                      count:
                        type: integer
                  - type: array
                    items:
                      type: object

  /api/v3/ticker/price:
    get:
      operationId: getSymbolPriceTicker
      summary: Get latest price for a symbol
      description: >
        Returns the latest price for a symbol or for all symbols.
        If no symbol is provided, returns prices for all symbols.
      parameters:
        - name: symbol
          in: query
          description: >
            Trading pair symbol (e.g. BTCUSDT). If omitted, returns prices
            for all symbols.
          required: false
          schema:
            type: string
        - name: symbols
          in: query
          description: >
            JSON array of trading pair symbols (e.g. ["BTCUSDT","ETHUSDT"]).
            Mutually exclusive with symbol.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: >
            Symbol price. Returns an object when symbol is specified, or an
            array when no symbol is given.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      symbol:
                        type: string
                      price:
                        type: string
                        description: Current price as a decimal string
                  - type: array
                    items:
                      type: object
                      properties:
                        symbol:
                          type: string
                        price:
                          type: string

  /api/v3/ticker/bookTicker:
    get:
      operationId: getSymbolOrderBookTicker
      summary: Get best price/quantity on the order book for a symbol
      description: >
        Returns the best bid and ask price and quantity for a symbol or
        for all symbols.
      parameters:
        - name: symbol
          in: query
          description: >
            Trading pair symbol (e.g. BTCUSDT). If omitted, returns data
            for all symbols.
          required: false
          schema:
            type: string
        - name: symbols
          in: query
          description: >
            JSON array of trading pair symbols. Mutually exclusive with symbol.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Best bid/ask on the order book
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      symbol:
                        type: string
                      bidPrice:
                        type: string
                      bidQty:
                        type: string
                      askPrice:
                        type: string
                      askQty:
                        type: string
                  - type: array
                    items:
                      type: object

  /api/v3/klines:
    get:
      operationId: getKlines
      summary: Get kline/candlestick data for a symbol
      description: >
        Returns kline/candlestick bars for a symbol. Klines are uniquely
        identified by their open time. Each kline contains OHLCV data.
      parameters:
        - name: symbol
          in: query
          description: Trading pair symbol (e.g. BTCUSDT)
          required: true
          schema:
            type: string
        - name: interval
          in: query
          description: >
            Kline interval. Options: 1s, 1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h,
            6h, 8h, 12h, 1d, 3d, 1w, 1M.
          required: true
          schema:
            type: string
            enum: [1s, 1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 6h, 8h, 12h, 1d, 3d, 1w, 1M]
        - name: startTime
          in: query
          description: Start time in milliseconds since Unix epoch
          required: false
          schema:
            type: integer
            format: int64
        - name: endTime
          in: query
          description: End time in milliseconds since Unix epoch
          required: false
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          description: Number of klines to return. Default 500; max 1000.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 500
      responses:
        "200":
          description: >
            Array of klines. Each element is an array:
            [openTime, open, high, low, close, volume, closeTime,
             quoteVolume, numTrades, takerBuyBaseVolume, takerBuyQuoteVolume, ignore]
          content:
            application/json:
              schema:
                type: array
                items:
                  type: array
                  description: Kline data array
                  items:
                    oneOf:
                      - type: integer
                      - type: string
