## MCPUpstream for Binance public market data API.
##
## This upstream connects to the Binance REST API and exposes a filtered set
## of public market data and statistics endpoints as MCP tools.
## No authentication is required for these endpoints.
##
## The overlay applies jq-based response transforms to extract the most
## relevant fields from each response.
##
## Prerequisites:
##   Create ConfigMaps with the spec and overlay:
##     kubectl -n mcp-system create configmap binance-spec \
##       --from-file=spec.yaml=deploy/examples/binance/spec.yaml
##     kubectl -n mcp-system create configmap binance-overlay \
##       --from-file=overlay.yaml=deploy/examples/binance/overlay.yaml
##
## Apply:
##   kubectl apply -f deploy/examples/binance/mcpupstream.yaml
apiVersion: mcp-anything.ai/v1alpha1
kind: MCPUpstream
metadata:
  name: market-data
  namespace: mcp-system
  labels:
    # Must match the MCPProxy's upstreamSelector.
    mcp-anything.ai/proxy: binance-proxy
spec:
  # Prefix for all tool names exposed by this upstream.
  # Tools will be named e.g. "binance__get_price", "binance__get_24hr_stats".
  toolPrefix: binance

  # Binance REST API base URL.
  baseURL: "https://api.binance.com"

  # OpenAPI spec from a ConfigMap. Contains only public market data endpoints.
  # See deploy/examples/binance/spec.yaml for the full spec.
  openapi:
    configMapRef:
      name: binance-spec
      key: spec.yaml

  # OpenAPI Overlay that adds jq response transforms and improves tool names.
  # See deploy/examples/binance/overlay.yaml for the full overlay.
  overlay:
    configMapRef:
      name: binance-overlay
      key: overlay.yaml

  # No outbound auth — Binance public market data is unauthenticated.
  # For authenticated endpoints (trading, account), add:
  # outboundAuth:
  #   strategy: api_key
  #   ... (requires a Secret with the API key)

  # HTTP transport tuning for Binance API.
  transport:
    maxIdleConns: 20
