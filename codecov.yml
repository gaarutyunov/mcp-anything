coverage:
  precision: 2
  round: down
  range: "80...100"
  status:
    project:
      default:
        # 80% coverage threshold for the overall project (existing code).
        target: 80%
        threshold: 1%
    patch:
      default:
        # 100% coverage threshold for new/changed code (patch coverage).
        target: 100%
        threshold: 0%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
