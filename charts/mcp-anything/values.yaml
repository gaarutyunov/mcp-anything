## mcp-anything operator Helm chart values.

replicaCount: 1

image:
  repository: ghcr.io/gaarutyunov/mcp-anything-operator
  pullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.AppVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Watch only this namespace. Empty = all namespaces (requires ClusterRole).
watchNamespace: ""

leaderElect: true

webhooks:
  enabled: false
  certManager: false

metrics:
  enabled: true
  port: 8443

healthProbe:
  port: 8081

nodeSelector: {}
tolerations: []
affinity: {}
