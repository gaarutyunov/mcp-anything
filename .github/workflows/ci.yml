name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOWORK: off
  OPERATOR_IMAGE: ghcr.io/${{ github.repository }}-operator:sha-${{ github.sha }}
  PROXY_IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
  CADDY_IMAGE: ghcr.io/${{ github.repository }}-caddy:sha-${{ github.sha }}
  WORKSPACE_IMAGE: ghcr.io/${{ github.repository }}-workspace:sha-${{ github.sha }}

jobs:
  lint-and-test:
    name: Lint, Vet, Unit Tests, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          install-only: true
          version: v2.7.2

      - name: check
        run: make check

  push-helm-chart:
    name: Push Helm Chart (OCI)
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          helm package charts/mcp-anything --version "0.0.0-sha.${{ github.sha }}" --app-version "${{ github.sha }}"
          helm push mcp-anything-0.0.0-sha.${{ github.sha }}.tgz oci://ghcr.io/${{ github.repository_owner }}

  build-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.PROXY_IMAGE }}

  build-caddy-image:
    name: Build & Push Caddy Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.caddy
          push: true
          tags: ${{ env.CADDY_IMAGE }}

  build-operator-image:
    name: Build & Push Operator Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.operator
          push: true
          tags: ${{ env.OPERATOR_IMAGE }}
          build-args: PROXY_IMAGE=${{ env.PROXY_IMAGE }}

  build-workspace-image:
    name: Build & Push Workspace Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: examples/remote-dev/Dockerfile.workspace
          push: true
          tags: ${{ env.WORKSPACE_IMAGE }}

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-image, build-caddy-image, build-operator-image, push-helm-chart]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: make integration
        env:
          PROXY_IMAGE: ${{ env.PROXY_IMAGE }}
          CADDY_IMAGE: ${{ env.CADDY_IMAGE }}
    
  e2e-tests:
    name: E2E / ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [build-image, build-operator-image]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Kraken Market Data
            test: TestKrakenMarketDataE2E
          - name: Remote Dev Workspace
            test: TestRemoteDevWorkspaceE2E
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run E2E test
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: make e2e
        env:
          PROXY_IMAGE: ${{ env.PROXY_IMAGE }}
          OPERATOR_IMAGE: ${{ env.OPERATOR_IMAGE }}
          E2E_TEST: ${{ matrix.test }}
          WORKSPACE_IMAGE: ${{ env.WORKSPACE_IMAGE }}
