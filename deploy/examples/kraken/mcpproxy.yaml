## MCPProxy for Kraken market data.
##
## This proxy exposes Kraken public market data endpoints as MCP tools
## with no inbound authentication (market data is publicly accessible).
##
## Prerequisites:
##   1. mcp-anything operator is deployed (see helm-values.yaml)
##   2. The kraken ConfigMaps are created:
##      kubectl -n mcp-system create configmap kraken-spec \
##        --from-file=spec.yaml=deploy/examples/kraken/spec.yaml
##      kubectl -n mcp-system create configmap kraken-overlay \
##        --from-file=overlay.yaml=deploy/examples/kraken/overlay.yaml
##   3. The MCPUpstream is applied (see mcpupstream.yaml)
##
## Apply:
##   kubectl apply -f deploy/examples/kraken/mcpproxy.yaml
apiVersion: mcp-anything.ai/v1alpha1
kind: MCPProxy
metadata:
  name: kraken-proxy
  namespace: mcp-system
spec:
  # Select the Kraken MCPUpstream in the same namespace.
  upstreamSelector:
    matchLabels:
      mcp-anything.ai/proxy: kraken-proxy

  # Use the latest proxy image.
  image: ghcr.io/gaarutyunov/mcp-anything:latest

  # Proxy pod resource requests/limits.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # MCP server configuration — listens on port 8080 with Streamable HTTP transport.
  server:
    port: 8080
    transport:
      - streamable-http
      - sse

  # Tool naming: use double-underscore separator for tool names,
  # e.g. "kraken__get_ticker", "kraken__get_ohlc".
  naming:
    separator: "__"
    maxLength: 128
    conflictResolution: error

  # No inbound authentication — Kraken public market data requires no API key.
  # To add JWT authentication, uncomment:
  # inboundAuth:
  #   strategy: jwt
  #   jwt:
  #     jwksUrl: "https://your-idp.example.com/.well-known/jwks.json"
