version: "2"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - exhaustive
    - noctx
    - bodyclose
    - contextcheck
    - crdlint
  settings:
    revive:
      rules:
        - name: exported
        - name: error-return
        - name: error-strings
    custom:
      crdlint:
        type: module
        description: checks that types_gen.go, spec_gen.go, and CRD YAML manifests are up to date with their sources
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/gaarutyunov/mcp-anything
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
